<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starforge — Nemesis Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #boot-error {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #050810;
      z-index: 9999;
      padding: 24px;
    }
    #boot-error.visible { display: flex; }
    #boot-error .panel {
      max-width: 520px;
      padding: 32px;
      text-align: center;
      background: rgba(8, 16, 32, 0.95);
      border: 1px solid rgba(0, 229, 255, 0.35);
      border-radius: 12px;
      color: #e8f4ff;
      font-family: Rajdhani, sans-serif;
    }
    #boot-error h2 {
      font-family: Orbitron, sans-serif;
      color: #00e5ff;
      margin-bottom: 12px;
    }
    #boot-error code {
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="boot-error">
    <div class="panel">
      <h2>Starforge kunde inte starta</h2>
      <p>Webbläsaren blockerar spelet när du öppnar filen direkt (<code>file://</code>).</p>
      <p style="margin-top:12px"><strong>Dubbelklicka på:</strong><br><code>Start Starforge.bat</code></p>
      <p style="margin-top:8px;color:#7a9bb8">Eller kör <code>start-game.ps1</code> i PowerShell.</p>
    </div>
  </div>

  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="ui-root"></div>
  </div>

  <script type="module">
    window.__STARFORGE_LOADED__ = false;
    try {
      const { Game } = await import("./js/game.js");
      const canvas = document.getElementById("game-canvas");
      const uiRoot = document.getElementById("ui-root");
      new Game(canvas, uiRoot);
      window.__STARFORGE_LOADED__ = true;
    } catch (err) {
      console.error(err);
      document.getElementById("boot-error").classList.add("visible");
    }
  </script>
  <script>
    setTimeout(function () {
      if (!window.__STARFORGE_LOADED__) {
        document.getElementById("boot-error").classList.add("visible");
      }
    }, 2000);
  </script>
</body>
</html>
